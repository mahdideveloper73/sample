<div>
    <h2 id="page-heading">
        <span jhiTranslate="sampleApp.orOrganizationUnit.home.title">Or Organization Units</span>

        <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-or-organization-unit" [routerLink]="['/or-organization-unit/new']">
            <fa-icon icon="plus"></fa-icon>
            <span  jhiTranslate="sampleApp.orOrganizationUnit.home.createLabel">
            Create a new Or Organization Unit
            </span>
        </button>
    </h2>

    <jhi-alert-error></jhi-alert-error>

    <jhi-alert></jhi-alert>

    <div class="alert alert-warning" id="no-result" *ngIf="orOrganizationUnits?.length === 0">
        <span jhiTranslate="sampleApp.orOrganizationUnit.home.notFound">No orOrganizationUnits found</span>
    </div>

    <div class="table-responsive" id="entities" *ngIf="orOrganizationUnits && orOrganizationUnits.length > 0">
        <table class="table table-striped" aria-describedby="page-heading">
            <thead>
                <tr>
                    <th scope="col" ><span jhiTranslate="global.field.id">ID</span></th>
                    <th scope="col" ><span jhiTranslate="sampleApp.orOrganizationUnit.name">Name</span></th>
                    <th scope="col" ><span jhiTranslate="sampleApp.orOrganizationUnit.parentId">Parent Id</span></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let orOrganizationUnit of orOrganizationUnits ;trackBy: trackId">
                    <td><a [routerLink]="['/or-organization-unit', orOrganizationUnit.id, 'view']">{{ orOrganizationUnit.id }}</a></td>
                    <td>{{ orOrganizationUnit.name }}</td>
                    <td>{{ orOrganizationUnit.parentId }}</td>
                    <td class="text-right">
                        <div class="btn-group">
                            <button type="submit"
                                    [routerLink]="['/or-organization-unit', orOrganizationUnit.id, 'view']"
                                    class="btn btn-info btn-sm">
                                <fa-icon icon="eye"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                            </button>

                            <button type="submit"
                                    [routerLink]="['/or-organization-unit', orOrganizationUnit.id, 'edit']"
                                    class="btn btn-primary btn-sm">
                                <fa-icon icon="pencil-alt"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                            </button>

                            <button type="submit" (click)="delete(orOrganizationUnit)"
                                    class="btn btn-danger btn-sm">
                                <fa-icon icon="times"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
